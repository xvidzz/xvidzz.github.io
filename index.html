<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xvidzz</title>
<link rel="icon" href="pictures/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #0b0b0b; color: white; min-height: 100vh; overflow-x: hidden; }

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #111;
  padding: 10px 20px;
  position: fixed;
  width: 100%;
  z-index: 1000;
  top: 0;
  gap: 12px;
}
.logo { font-size: 26px; font-weight: 800; white-space: nowrap; }
.logo span { background: orange; color: black; padding: 2px 6px; border-radius: 4px; }

/* ── SEARCH ── */
.search-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  position: relative;
}
.search-box {
  position: relative;
  width: 100%;
  max-width: 420px;
}
.search-box input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border-radius: 999px;
  border: 1px solid #2a2a2a;
  background: #1a1a1a;
  color: #fff;
  outline: none;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.2s, background 0.2s;
}
.search-box input::placeholder { color: #666; }
.search-box input:focus { border-color: #444; background: #222; }
.search-icon {
  position: absolute;
  top: 50%;
  left: 12px;
  width: 18px;
  height: 18px;
  fill: #888;
  transform: translateY(-50%);
  pointer-events: none;
}

/* ── SUGGESTIONS ── */
.suggestions {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  width: 100%;
  background: #1c1c1c;
  border-radius: 14px;
  overflow: hidden;
  z-index: 2000;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  display: none;
}
.suggestions.open { display: block; }
.sug-item { padding: 10px 16px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px; }
.sug-item:hover { background: #2a2a2a; }
.sug-tag { font-size: 11px; background: #333; color: #aaa; padding: 2px 8px; border-radius: 99px; }
.sug-tag.cat { background: #2a1a00; color: orange; }
.sug-tag.model { background: #001a2a; color: #5bf; }

/* ── TABS ── */
.tabs {
  display: flex;
  background: #111;
  border-bottom: 2px solid #1e1e1e;
  position: sticky;
  top: 50px;
  z-index: 100;
  margin-top: 50px;
}
.tab-btn {
  flex: 1;
  padding: 12px 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  color: #666;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.15s;
  user-select: none;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.tab-btn:hover { color: #fff; }
.tab-btn.active { color: orange; border-bottom-color: orange; }

/* ── BANNER ── */
.banner { width: 100%; text-align: center; padding: 5px 0; overflow: hidden; }

/* ── CATEGORIES PILLS ── */
.categories {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  overflow-x: auto;
  scrollbar-width: none;
}
.categories::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  padding: 6px 16px;
  border-radius: 999px;
  border: 1px solid #2a2a2a;
  background: #111;
  color: #888;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.pill:hover, .pill.active { background: orange; color: #000; border-color: orange; }

/* ── GALLERY ── */
.gallery-label { padding: 4px 14px 6px; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
.gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 0 10px 10px; }
@media (min-width: 480px)  { .gallery { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 768px)  { .gallery { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 1024px) { .gallery { grid-template-columns: repeat(5, 1fr); } }

.card { background: #111; border-radius: 10px; overflow: hidden; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.card:active { opacity: 0.8; }
.card-img-wrap { position: relative; padding-top: 130%; overflow: hidden; }
.card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.card-title { font-size: 12px; padding: 4px 8px 6px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── MODELS GRID ── */
.models-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
@media (min-width: 480px) { .models-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 768px) { .models-grid { grid-template-columns: repeat(4, 1fr); } }
.model-card { background: #111; border-radius: 12px; overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
.model-card:hover { border-color: orange; }
.model-card-img-wrap { position: relative; padding-top: 120%; overflow: hidden; }
.model-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.model-card-name { font-size: 14px; font-weight: 700; padding: 8px 10px 4px; color: #fff; }
.model-card-count { font-size: 11px; padding: 0 10px 8px; color: #888; }

/* ── BACK BAR ── */
.back-bar { display: none; align-items: center; gap: 10px; padding: 10px 14px; background: #111; border-bottom: 1px solid #1e1e1e; cursor: pointer; }
.back-bar.visible { display: flex; }
.back-bar svg { width: 18px; height: 18px; fill: orange; }
.back-bar span { font-size: 14px; font-weight: 600; color: orange; }

/* ── ACTIVE FILTER CHIPS ── */
.active-filters { display: flex; gap: 6px; padding: 6px 14px; flex-wrap: wrap; }
.filter-chip { display: flex; align-items: center; gap: 6px; background: #1c1c1c; border: 1px solid #333; border-radius: 99px; padding: 4px 10px 4px 12px; font-size: 12px; color: #ccc; }
.filter-chip .x { cursor: pointer; color: #888; font-size: 15px; line-height: 1; }
.filter-chip .x:hover { color: orange; }

/* ── LOAD MORE ── */
.load-more-wrap { display: none; justify-content: center; padding: 20px 10px 40px; }
.load-more-btn { background: orange; color: #000; font-weight: 800; font-size: 15px; border: none; border-radius: 999px; padding: 14px 40px; cursor: pointer; font-family: 'Inter', sans-serif; letter-spacing: 0.5px; }
.load-more-btn:active { opacity: 0.8; }
.sentinel { height: 40px; }
.nothing { color: #aaa; font-size: 16px; text-align: center; grid-column: 1 / -1; padding: 60px 0; }

/* ── FULLSCREEN ── */
.fullscreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; z-index: 1001; }
.fullscreen.open { display: flex; }
.fs-img-area { width: 100%; height: 100vh; flex-shrink: 0; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
.fs-img-area img { width: 100%; height: 100%; object-fit: contain; display: block; user-select: none; }
.fs-close { position: absolute; top: 12px; right: 14px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; color: white; background: rgba(0,0,0,0.65); border-radius: 50%; z-index: 10; }
.fs-title-bar { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 30px 14px 14px; font-size: 15px; font-weight: 600; pointer-events: none; }
.fs-scroll-hint { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 3px; color: rgba(255,255,255,0.5); font-size: 11px; pointer-events: none; animation: bounce 1.6s infinite; }
.fs-scroll-hint svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.5); }
@keyframes bounce { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(5px); } }
.related-section { background: #111; padding: 14px 12px 30px; border-top: 1px solid #1e1e1e; flex-shrink: 0; }
.related-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 10px; }
.related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
@media (min-width: 480px) { .related-grid { grid-template-columns: repeat(4, 1fr); } }
.related-card { cursor: pointer; border-radius: 8px; overflow: hidden; background: #1c1c1c; }
.related-card-img-wrap { position: relative; padding-top: 130%; }
.related-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
.related-card-title { font-size: 11px; color: #aaa; padding: 4px 5px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── IG OVERLAY ── */
.ig-overlay { position: fixed; inset: 0; background: #0b0b0b; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px; text-align: center; }
.ig-icon { font-size: 56px; margin-bottom: 20px; }
.ig-overlay h2 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
.ig-overlay p { color: #888; font-size: 15px; line-height: 1.7; max-width: 300px; }
.ig-overlay strong { color: white; }
.ig-step { display: inline-block; background: orange; color: #000; font-weight: 700; padding: 2px 10px; border-radius: 6px; margin-top: 4px; }
</style>
</head>

<script>
// ── Instagram detection ──
(function() {
  const ua = navigator.userAgent || '';
  if (ua.includes('Instagram') || ua.includes('FBAN') || ua.includes('FBAV'))
    document.getElementById('igOverlay').style.display = 'flex';
})();

// ══════════════════════════════════════════════════════
//  MODELS
// ══════════════════════════════════════════════════════
const models = [
  { slug: "lela_sohna", name: "Lela Sohna", cover: "pictures/models/lela_sohna/cover.png" },
  { slug: "mellooow",  name: "mellooow",  cover: "pictures/models/mellooow/cover.png"  },
  { slug: "micagiammaria",  name: "micagiammaria",  cover: "pictures/models/micagiammaria/cover.png"  },
  // -- sem pridaj dalsie modelky --
];

// ══════════════════════════════════════════════════════
//  IMAGES
// ══════════════════════════════════════════════════════
const LINK = "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de";
const images = [];

function add(modelSlug, category, od, do_) {
  for (let i = od; i <= do_; i++) {
    images.push({
      img: `pictures/models/${modelSlug}/${category}/img (${i}).png`,
      category,
      model: modelSlug,
      link: LINK
    });
  }
}

function addGeneral(category, od, do_) {
  for (let i = od; i <= do_; i++) {
    images.push({
      img: `pictures/general/${category}/img (${i}).png`,
      category,
      model: null,
      link: LINK
    });
  }
}

// ── PRIDAVAJ / MENAS LEN CISLA ──────────────────
// Lela Sohna
add("lela_sohna", "bikiny",  1, 2);
add("lela_sohna", "tits",    2, 14);
add("lela_sohna", "cosplay", 1,  6);
add("lela_sohna", "ass",     1, 7);

// Anna Nova
add("micagiammaria", "bikiny",  1, 15);
add("micagiammaria", "tits",    1, 11);
add("micagiammaria", "cosplay", 1,  5);
add("micagiammaria", "ass",     1, 20);

add("mellooow", "bikiny",  1, 7);
add("mellooow", "tits",    1, 14);
add("mellooow", "cosplay", 1,  3);
add("mellooow", "ass",     1, 3);

// General (bez modelky)
// addGeneral("bikiny", 1, 10);
// ────────────────────────────────────────────────────

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let activeTab      = 'categories';
let activeCategory = 'all';
let activeModel    = null;
let searchModel    = null;
let searchCategory = null;
let searchRaw      = '';
let currentData    = [];
let renderedCount  = 0;
const PAGE_SIZE    = 12;

// ══════════════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════════════
const searchInput = document.getElementById('searchInput');
const sugBox      = document.getElementById('suggestions');

searchInput.addEventListener('input', handleSearch);
searchInput.addEventListener('focus', handleSearch);
document.addEventListener('click', e => {
  if (!e.target.closest('.search-box')) sugBox.classList.remove('open');
});

function handleSearch() {
  const raw = searchInput.value.trim().toLowerCase();
  searchRaw = raw;

  if (!raw) {
    sugBox.classList.remove('open');
    searchModel = null; searchCategory = null;
    if (activeTab === 'categories') resetGallery();
    return;
  }

  const cats  = [...new Set(images.map(i => i.category))];
  const words = raw.split(/\s+/);

  let matchedCat   = null;
  let matchedModel = null;

  cats.forEach(c => {
    if (words.some(w => c.includes(w) || w.includes(c))) matchedCat = c;
  });

  models.forEach(m => {
    const nameWords = m.name.toLowerCase().split(' ');
    const slugWords = m.slug.toLowerCase().split('_');
    const allWords  = [...nameWords, ...slugWords];
    if (words.some(w => allWords.some(mw => mw.startsWith(w) || w.startsWith(mw)))) {
      matchedModel = m.slug;
    }
  });

  const items = [];
  if (matchedModel && matchedCat) {
    const m = models.find(x => x.slug === matchedModel);
    items.push({ label: `${m.name} + ${matchedCat}`, type: 'both', model: matchedModel, cat: matchedCat });
  }
  if (matchedModel) {
    const m = models.find(x => x.slug === matchedModel);
    items.push({ label: m.name, type: 'model', model: matchedModel, cat: null });
  }
  if (matchedCat) {
    items.push({ label: matchedCat.charAt(0).toUpperCase() + matchedCat.slice(1), type: 'cat', model: null, cat: matchedCat });
  }

  if (items.length === 0) {
    sugBox.classList.remove('open');
    searchModel = null; searchCategory = null;
    if (activeTab === 'categories') resetGallery();
    return;
  }

  sugBox.innerHTML = items.map((it, idx) => `
    <div class="sug-item" onclick="applySuggestion(${idx})">
      <span>${it.label}</span>
      <span class="sug-tag ${it.type === 'cat' ? 'cat' : 'model'}">${it.type === 'both' ? 'Model + Category' : it.type === 'model' ? 'Model' : 'Category'}</span>
    </div>
  `).join('');
  sugBox._items = items;
  sugBox.classList.add('open');
}

function applySuggestion(idx) {
  const it = sugBox._items[idx];
  searchModel    = it.model;
  searchCategory = it.cat;
  searchRaw      = '';
  searchInput.value = '';
  sugBox.classList.remove('open');

  activeTab = 'categories';
  activeModel = null;
  document.getElementById('tabCategories').classList.add('active');
  document.getElementById('tabModels').classList.remove('active');
  document.getElementById('categoryPills').style.display = 'flex';
  document.getElementById('gallery').style.display       = 'grid';
  document.getElementById('sentinel').style.display      = 'block';
  document.getElementById('modelsGrid').style.display    = 'none';
  hideBackBar();

  if (searchCategory) {
    activeCategory = searchCategory;
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.toggle('active', p.dataset.cat === searchCategory);
    });
  } else {
    activeCategory = 'all';
    document.querySelectorAll('.pill').forEach(p => {
      p.classList.toggle('active', p.dataset.cat === 'all');
    });
  }

  renderActiveFilters();
  resetGallery();
}

function renderActiveFilters() {
  const wrap = document.getElementById('activeFilters');
  wrap.innerHTML = '';
  if (searchModel) {
    const m = models.find(x => x.slug === searchModel);
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.innerHTML = `👤 ${m ? m.name : searchModel} <span class="x" onclick="clearSearchModel()">×</span>`;
    wrap.appendChild(chip);
  }
}

function clearSearchModel() {
  searchModel = null;
  renderActiveFilters();
  resetGallery();
}

// ══════════════════════════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════════════════════════
function switchTab(tab) {
  activeTab = tab; activeModel = null; activeCategory = 'all';
  searchModel = null; searchCategory = null; searchRaw = '';
  searchInput.value = '';
  document.getElementById('activeFilters').innerHTML = '';
  document.getElementById('tabCategories').classList.toggle('active', tab === 'categories');
  document.getElementById('tabModels').classList.toggle('active', tab === 'models');
  document.getElementById('categoryPills').style.display = tab === 'categories' ? 'flex' : 'none';
  document.getElementById('gallery').style.display       = tab === 'categories' ? 'grid' : 'none';
  document.getElementById('sentinel').style.display      = tab === 'categories' ? 'block' : 'none';
  document.getElementById('modelsGrid').style.display    = tab === 'models'     ? 'grid' : 'none';
  hideBackBar();
  if (tab === 'categories') { buildCategories(); resetGallery(); }
  else { document.getElementById('galleryLabel').textContent = ''; buildModelsGrid(); }
}

// ── BACK ──
function showBackBar(label) {
  document.getElementById('backBar').classList.add('visible');
  document.getElementById('backLabel').textContent = label;
}
function hideBackBar() { document.getElementById('backBar').classList.remove('visible'); }
function goBack() {
  if (activeModel !== null) {
    activeModel = null;
    document.getElementById('gallery').style.display    = 'none';
    document.getElementById('sentinel').style.display   = 'none';
    document.getElementById('modelsGrid').style.display = 'grid';
    document.getElementById('galleryLabel').textContent = '';
    hideBackBar();
    buildModelsGrid();
  }
}

// ── CATEGORIES ──
function buildCategories() {
  const cats = ['all', ...new Set(images.map(i => i.category).filter(Boolean))];
  const pills = document.getElementById('categoryPills');
  pills.innerHTML = '';
  cats.forEach(cat => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (cat === activeCategory ? ' active' : '');
    pill.dataset.cat = cat;
    pill.textContent = cat === 'all' ? 'All' : cat.charAt(0).toUpperCase() + cat.slice(1);
    pill.onclick = () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeCategory = cat;
      resetGallery();
    };
    pills.appendChild(pill);
  });
}

// ── FILTER ──
function getFiltered() {
  let result = images.filter(img => {
    const matchCat   = activeCategory === 'all' || img.category === activeCategory;
    const matchModel = (activeModel === null && searchModel === null)
                     || (activeModel && img.model === activeModel)
                     || (searchModel && img.model === searchModel);
    const matchSCat  = !searchCategory || img.category === searchCategory;
    return matchCat && matchModel && matchSCat;
  });

  // Shuffle ked nie je vybrany konkretny model
  if (activeModel === null && searchModel === null) {
    for (let i = result.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]];
    }
  }

  return result;
}

function resetGallery() {
  currentData = getFiltered(); renderedCount = 0;
  document.getElementById('gallery').innerHTML = '';
  const total = currentData.length;
  const label = document.getElementById('galleryLabel');
  const mName = activeModel
    ? (models.find(x => x.slug === activeModel)?.name || activeModel)
    : searchModel
    ? (models.find(x => x.slug === searchModel)?.name || searchModel)
    : null;
  if (mName && activeCategory !== 'all') {
    label.textContent = `${mName} · ${activeCategory} — ${total}`;
  } else if (mName) {
    label.textContent = `${mName} — ${total} photo${total !== 1 ? 's' : ''}`;
  } else if (activeCategory !== 'all') {
    label.textContent = `${activeCategory.charAt(0).toUpperCase() + activeCategory.slice(1)} — ${total}`;
  } else {
    label.textContent = `All photos — ${total}`;
  }
  loadNextBatch();
}

function titleFromImg(img) {
  const m = models.find(x => x.slug === img.model);
  return m ? m.name : img.category || '';
}

function renderCard(data) {
  const title = titleFromImg(data);
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `<div class="card-img-wrap"><img src="${data.img}" alt="${title}" loading="lazy"></div><div class="card-title">${title}</div>`;
  div.onclick = () => openFullscreen(data);
  return div;
}

function loadNextBatch() {
  const gallery = document.getElementById('gallery');
  if (currentData.length === 0 && renderedCount === 0) {
    const msg = document.createElement('div');
    msg.className = 'nothing';
    msg.textContent = 'Nothing found';
    gallery.appendChild(msg);
    return;
  }
  const batch = currentData.slice(renderedCount, renderedCount + PAGE_SIZE);
  batch.forEach(item => gallery.appendChild(renderCard(item)));
  renderedCount += batch.length;
  updateLoadMoreBtn();
}

// ── LOAD MORE ──
function updateLoadMoreBtn() {
  const wrap = document.getElementById('loadMoreWrap');
  wrap.style.display = renderedCount < currentData.length ? 'flex' : 'none';
}

function loadMoreClick() {
  if (Math.random() < 0.3) window.open(LINK, '_blank');
  loadNextBatch();
  updateLoadMoreBtn();
}

// ── MODELS TAB ──
function buildModelsGrid() {
  const grid = document.getElementById('modelsGrid');
  grid.innerHTML = '';
  models.forEach(model => {
    const count = images.filter(i => i.model === model.slug).length;
    const card = document.createElement('div');
    card.className = 'model-card';
    card.innerHTML = `<div class="model-card-img-wrap"><img src="${model.cover}" alt="${model.name}" loading="lazy"></div><div class="model-card-name">${model.name}</div><div class="model-card-count">${count} photo${count !== 1 ? 's' : ''}</div>`;
    card.onclick = () => openModelGallery(model);
    grid.appendChild(card);
  });
}

function openModelGallery(model) {
  activeModel = model.slug;
  document.getElementById('modelsGrid').style.display = 'none';
  document.getElementById('gallery').style.display    = 'grid';
  document.getElementById('sentinel').style.display   = 'block';
  showBackBar(`${model.name}`);
  resetGallery();
}

// ── FULLSCREEN ──
function openFullscreen(data) {
  const m = models.find(x => x.slug === data.model);
  const title = m ? `${m.name} · ${data.category}` : data.category;
  document.getElementById('fsImg').src = data.img;
  document.getElementById('fsTitleBar').textContent = title;
  buildRelated(data);
  const fs = document.getElementById('fullscreen');
  fs.classList.add('open');
  fs.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  if (Math.random() < 0.3) window.open(data.link, '_blank');
}

function closeFullscreen() {
  document.getElementById('fullscreen').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('fsImg').src = '';
}

function buildRelated(data) {
  const grid = document.getElementById('relatedGrid');
  grid.innerHTML = '';
  const related = images.filter(img => img !== data && (img.category === data.category || img.model === data.model)).slice(0, 18);
  if (!related.length) {
    grid.innerHTML = '<div style="color:#666;font-size:13px;padding:8px 0;grid-column:1/-1;">No related photos</div>';
    return;
  }
  related.forEach(item => {
    const t = titleFromImg(item);
    const card = document.createElement('div');
    card.className = 'related-card';
    card.innerHTML = `<div class="related-card-img-wrap"><img src="${item.img}" alt="${t}" loading="lazy"></div><div class="related-card-title">${t}</div>`;
    card.onclick = () => openFullscreen(item);
    grid.appendChild(card);
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFullscreen(); });

// ── INIT ──
switchTab('categories');
</script>
