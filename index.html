<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xvidzz</title>
<link rel="icon" href="pictures/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b0b0b;
  color: white;
  min-height: 100vh;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #111;
  padding: 10px 20px;
  position: fixed;
  width: 100%;
  z-index: 1000;
  top: 0;
}
.left { display: flex; align-items: center; gap: 15px; }
.logo { font-size: 26px; font-weight: 800; }
.logo span { background: orange; color: black; padding: 2px 6px; border-radius: 4px; }
.search { flex: 1; display: flex; justify-content: center; }
.search input {
  width: 100%;
  max-width: 400px;
  padding: 10px;
  border-radius: 25px;
  border: none;
  background: #1c1c1c;
  color: white;
  outline: none;
  box-sizing: border-box;
}
.banner { width: 100%; text-align: center; padding: 5px 0; margin-top: 60px; }
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  padding: 10px 15px 15px 15px;
  margin-top: 10px;
  min-height: 300px;
}
.card { background: #111; padding: 5px; border-radius: 10px; cursor: pointer; }
.card img { width: 100%; height: 240px; object-fit: cover; border-radius: 8px; }
.title { font-size: 13px; padding: 5px; color: #ccc; }
.nothing { color: #aaa; font-size: 18px; text-align: center; grid-column: 1 / -1; padding: 50px 0; }
.fullscreen {
  position: fixed;
  top: 60px;
  left: 0;
  width: 100%;
  height: calc(100% - 60px);
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}
.fullscreen img { max-width: 90%; max-height: 90%; object-fit: contain; border-radius: 10px; }
.fullscreen .close { position: absolute; top: 10px; right: 20px; font-size: 28px; cursor: pointer; color: white; font-weight: bold; z-index: 1001; }
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="left">
    <div class="logo">X<span>vidzz</span></div>
  </div>
  <div class="search">
    <input type="text" placeholder="Search Xvidzz">
  </div>
</div>

<!-- HORNY BANNER -->
<div class="banner">
  <script>
    atOptions = { 'key' : '983b9cd2f75f07d4c0212fa312f1c19e', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
  </script>
  <script src="https://www.highperformanceformat.com/983b9cd2f75f07d4c0212fa312f1c19e/invoke.js"></script>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- DOLNY BANNER -->
<div class="banner">
  <script src="https://pl28980273.profitablecpmratenetwork.com/18/b3/02/18b302cf47484bb230e4bff70f2b3c0c.js"></script>
</div>

<!-- FULLSCREEN IMAGE -->
<div class="fullscreen" id="fullscreen">
  <span class="close" onclick="closeFullscreen()">×</span>
  <img id="fsImg" src="">
</div>

<script>
// PRELOADED IMAGES
const images = [
  { img: "pictures/img1.png", title: "Mountain", link: "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de" },
  { img: "pictures/img2.png", title: "Forest", link: "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de" },
  { img: "pictures/img3.png", title: "City", link: "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de" }
];

const gallery = document.getElementById("gallery");
const fullscreen = document.getElementById("fullscreen");
const fsImg = document.getElementById("fsImg");

// RENDER IMAGE
function renderImage(data) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `<img src="${data.img}"><div class="title">${data.title}</div>`;
  div.onclick = () => openFullscreen(data);
  gallery.appendChild(div);
}

// LOAD ALL
function loadImages() {
  gallery.innerHTML = "";
  images.forEach(renderImage);
}
// Pridaj toto NA ZAČIATOK <script> bloku

function isInstagramBrowser() {
  const ua = navigator.userAgent || '';
  return ua.includes('Instagram');
}

function showIGWarning() {
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #0b0b0b; z-index: 99999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif; color: white;
    text-align: center; padding: 30px; box-sizing: border-box;
  `;
  overlay.innerHTML = `
    <div style="font-size:50px; margin-bottom:20px;">🌐</div>
    <h2 style="font-size:22px; margin-bottom:12px;">Open in External Browser</h2>
    <p style="color:#aaa; font-size:15px; max-width:300px; line-height:1.6;">
      This site doesn't work properly in Instagram's browser.<br><br>
      Tap the <strong style="color:white;">⋮ menu</strong> (top right) and select 
      <strong style="color:orange;">"Open in browser"</strong>.
    </p>
  `;
  document.body.appendChild(overlay);
}

if (isInstagramBrowser()) {
  showIGWarning();
}
  
loadImages();

// SEARCH
const searchInput = document.querySelector(".search input");
searchInput.addEventListener("input", function() {
  const value = this.value.toLowerCase();
  gallery.innerHTML = "";
  const filtered = images.filter(img => img.title.toLowerCase().includes(value));
  if (filtered.length === 0) {
    const div = document.createElement("div");
    div.className = "nothing";
    div.innerText = "Nothing found";
    gallery.appendChild(div);
  } else {
    filtered.forEach(renderImage);
  }
});

// FULLSCREEN FUNCTIONS + POPUNDER
function openFullscreen(data) {
  fsImg.src = data.img;
  fullscreen.style.display = "flex";
  window.open(data.link, "_blank"); // Popunder / Smartlink
}

function closeFullscreen() { fullscreen.style.display = "none"; }
</script>

</body>
</html>
