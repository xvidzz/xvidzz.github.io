// ── STATE ──
let activeTab = 'categories', activeCategory = 'all', activeModel = null;
let searchQuery = '', currentData = [], renderedCount = 0;
const PAGE_SIZE = 12;

// ── Pomocna funkcia: ziskaj titulok z cesty suboru ──
function titleFromPath(path) {
  // "pictures/tits/img(3).png" → "Img (3)"
  const file = path.split('/').pop().replace(/\.[^.]+$/, ''); // bez pripony
  return file.replace(/([a-zA-Z]+)\((\d+)\)/, '$1 ($2)').replace(/_/g, ' ');
}

// ── TAB SWITCHING ──
function switchTab(tab) {
  activeTab = tab; activeModel = null; activeCategory = 'all'; searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('tabCategories').classList.toggle('active', tab === 'categories');
  document.getElementById('tabModels').classList.toggle('active', tab === 'models');
  document.getElementById('categoryPills').style.display = tab === 'categories' ? 'flex' : 'none';
  document.getElementById('gallery').style.display       = tab === 'categories' ? 'grid' : 'none';
  document.getElementById('sentinel').style.display      = tab === 'categories' ? 'block' : 'none';
  document.getElementById('modelsGrid').style.display    = tab === 'models'     ? 'grid' : 'none';
  hideBackBar();
  if (tab === 'categories') { buildCategories(); resetGallery(); }
  else { document.getElementById('galleryLabel').textContent = ''; buildModelsGrid(); }
}

// ── BACK ──
function showBackBar(label) { document.getElementById('backBar').classList.add('visible'); document.getElementById('backLabel').textContent = label; }
function hideBackBar() { document.getElementById('backBar').classList.remove('visible'); }
function goBack() {
  if (activeModel !== null) {
    activeModel = null;
    document.getElementById('gallery').style.display    = 'none';
    document.getElementById('sentinel').style.display   = 'none';
    document.getElementById('modelsGrid').style.display = 'grid';
    document.getElementById('galleryLabel').textContent = '';
    hideBackBar(); buildModelsGrid();
  }
}

// ── CATEGORIES ──
function buildCategories() {
  const cats = ['all', ...new Set(images.map(i => i.category).filter(Boolean))];
  const pills = document.getElementById('categoryPills');
  pills.innerHTML = '';
  cats.forEach(cat => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (cat === activeCategory ? ' active' : '');
    pill.textContent = cat === 'all' ? 'All' : cat.charAt(0).toUpperCase() + cat.slice(1);
    pill.onclick = () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active'); activeCategory = cat; resetGallery();
    };
    pills.appendChild(pill);
  });
}

// ── FILTER — title je volitelny, nekrashuje ak chyba ──
function getFiltered() {
  const q = searchQuery;
  return images.filter(img => {
    const matchCat   = activeCategory === 'all' || img.category === activeCategory;
    const matchModel = activeModel === null || img.model === activeModel;
    const t = (img.title || titleFromPath(img.img)).toLowerCase();
    const matchSearch = !q || t.includes(q);
    return matchCat && matchModel && matchSearch;
  });
}

function resetGallery() {
  currentData = getFiltered(); renderedCount = 0;
  document.getElementById('gallery').innerHTML = '';
  const total = currentData.length;
  const label = document.getElementById('galleryLabel');
  if (activeModel) {
    const m = models.find(x => x.slug === activeModel);
    label.textContent = `${m ? m.name : activeModel} — ${total} photo${total !== 1 ? 's' : ''}`;
  } else if (searchQuery) {
    label.textContent = `Results for "${searchQuery}" — ${total}`;
  } else if (activeCategory !== 'all') {
    label.textContent = `${activeCategory.charAt(0).toUpperCase() + activeCategory.slice(1)} — ${total}`;
  } else {
    label.textContent = `All photos — ${total}`;
  }
  loadNextBatch();
}

function renderCard(data) {
  const title = data.title || titleFromPath(data.img);
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-img-wrap">
      <img src="${data.img}" alt="${title}" loading="lazy">
    </div>
    <div class="card-title">${title}</div>
  `;
  div.onclick = () => openFullscreen(data);
  return div;
}

function loadNextBatch() {
  const gallery = document.getElementById('gallery');
  if (currentData.length === 0 && renderedCount === 0) {
    const msg = document.createElement('div'); msg.className = 'nothing'; msg.textContent = 'Nothing found'; gallery.appendChild(msg); return;
  }
  const batch = currentData.slice(renderedCount, renderedCount + PAGE_SIZE);
  batch.forEach(item => gallery.appendChild(renderCard(item)));
  renderedCount += batch.length;
}

const observer = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && renderedCount < currentData.length) loadNextBatch();
}, { rootMargin: '200px' });
observer.observe(document.getElementById('sentinel'));

    const card = document.createElement('div'); card.className = 'model-card';
    card.innerHTML = `
      <div class="model-card-img-wrap"><img src="${model.cover}" alt="${model.name}" loading="lazy"></div>
      <div class="model-card-name">${model.name}</div>
      <div class="model-card-count">${count} photo${count !== 1 ? 's' : ''}</div>
    `;
    card.onclick = () => openModelGallery(model);
    grid.appendChild(card);
  });
}

function openModelGallery(model) {
  activeModel = model.slug;
  document.getElementById('modelsGrid').style.display = 'none';
  document.getElementById('gallery').style.display    = 'grid';
  document.getElementById('sentinel').style.display   = 'block';
  showBackBar(`← ${model.name}`);
  resetGallery();
}

// ── FULLSCREEN ──
function openFullscreen(data) {
  const title = data.title || titleFromPath(data.img);
  document.getElementById('fsImg').src = data.img;
  document.getElementById('fsTitleBar').textContent = title;
  buildRelated(data);
  const fs = document.getElementById('fullscreen');
  fs.classList.add('open'); fs.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  window.open(data.link, '_blank');
}

function closeFullscreen() {
  document.getElementById('fullscreen').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('fsImg').src = '';
}

function buildRelated(data) {
  const grid = document.getElementById('relatedGrid'); grid.innerHTML = '';
  const related = images.filter(img =>
    img !== data && (img.category === data.category || img.model === data.model)
  ).slice(0, 18);
  if (related.length === 0) {
    grid.innerHTML = '<div style="color:#666;font-size:13px;padding:8px 0;grid-column:1/-1;">No related photos</div>'; return;
  }
  related.forEach(item => {
    const t = item.title || titleFromPath(item.img);
    const card = document.createElement('div'); card.className = 'related-card';
    card.innerHTML = `
      <div class="related-card-img-wrap"><img src="${item.img}" alt="${t}" loading="lazy"></div>
      <div class="related-card-title">${t}</div>
    `;
    card.onclick = () => openFullscreen(item);
    grid.appendChild(card);
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFullscreen(); });

document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.toLowerCase().trim();
  if (activeTab === 'categories') resetGallery();
});

switchTab('categories');
</script>
</body>
</html>
