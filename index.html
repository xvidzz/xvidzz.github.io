<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xvidzz</title>

<!-- Favicon -->
<link rel="icon" href="pictures/logo.png" type="image/png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b0b0b;
  color: white;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #111;
  padding: 10px 20px;
  position: fixed;
  width: 100%;
  z-index: 1000;
  top: 0;
}

.left {
  display: flex;
  align-items: center;
  gap: 15px;
}

.logo {
  font-size: 26px;
  font-weight: 800;
}

.logo span {
  background: orange;
  color: black;
  padding: 2px 6px;
  border-radius: 4px;
}

/* ===== SEARCH ===== */
.search {
  flex: 1;
  display: flex;
  justify-content: center;
}

.search input {
  width: 100%;
  max-width: 400px;
  padding: 10px;
  border-radius: 25px;
  border: none;
  background: #1c1c1c;
  color: white;
  outline: none;
  box-sizing: border-box;
}

/* ===== BANNER ===== */
.banner {
  width: 100%;
  text-align: center;
  margin-top: 60px; /* pod header */
  padding: 5px 0;
}

/* ===== GALLERY ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  padding: 10px 15px 15px 15px;
  margin-top: 10px;
  min-height: 300px;
}

.card {
  background: #111;
  padding: 5px;
  border-radius: 10px;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  border-radius: 8px;
}

.title {
  font-size: 13px;
  padding: 5px;
  color: #ccc;
}

.nothing {
  color: #aaa;
  font-size: 18px;
  text-align: center;
  grid-column: 1 / -1;
  padding: 50px 0;
}

/* ===== FULLSCREEN MODAL ===== */
.fullscreen {
  position: fixed;
  top: 60px; /* pod header */
  left: 0;
  width: 100%;
  height: calc(100% - 60px);
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.fullscreen img {
  max-width: 90%;
  max-height: 90%;
  object-fit: contain;
  border-radius: 10px;
}

.fullscreen .close {
  position: absolute;
  top: 10px;
  right: 20px;
  font-size: 28px;
  cursor: pointer;
  color: white;
  font-weight: bold;
  z-index: 1001;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="left">
    <div class="logo">X<span>vidzz</span></div>
  </div>

  <div class="search">
    <input type="text" placeholder="Search Xvidzz">
  </div>
</div>

<!-- BANNER AD pod header -->
<div class="banner">
  <script>
    atOptions = {
      'key' : '832df44307f960b524b3eca813248a1a',
      'format' : 'iframe',
      'height' : 60,
      'width' : 468,
      'params' : {}
    };
  </script>
  <script src="https://www.highperformanceformat.com/832df44307f960b524b3eca813248a1a/invoke.js"></script>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- FULLSCREEN IMAGE -->
<div class="fullscreen" id="fullscreen">
  <span class="close" onclick="closeFullscreen()">×</span>
  <img id="fsImg" src="">
</div>

<script>
// PRELOADED IMAGES
const images = [
  { img: "pictures/img1.jpg", title: "Mountain", link: "https://pl28979803.profitablecpmratenetwork.com/84/4b/53/844b53f17ac3683627414d48320772cd.js" },
  { img: "pictures/img2.jpg", title: "Forest", link: "https://pl28979803.profitablecpmratenetwork.com/84/4b/53/844b53f17ac3683627414d48320772cd.js" },
  { img: "pictures/img3.jpg", title: "City", link: "https://pl28979803.profitablecpmratenetwork.com/84/4b/53/844b53f17ac3683627414d48320772cd.js" }
];

const gallery = document.getElementById("gallery");
const fullscreen = document.getElementById("fullscreen");
const fsImg = document.getElementById("fsImg");

// RENDER IMAGE
function renderImage(data) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${data.img}">
    <div class="title">${data.title}</div>
  `;
  div.onclick = () => openFullscreen(data);
  gallery.appendChild(div);
}

// LOAD ALL
function loadImages() {
  gallery.innerHTML = "";
  images.forEach(renderImage);
}

loadImages();

// SEARCH
const searchInput = document.querySelector(".search input");
searchInput.addEventListener("input", function() {
  const value = this.value.toLowerCase();
  gallery.innerHTML = "";
  const filtered = images.filter(img => img.title.toLowerCase().includes(value));

  if (filtered.length === 0) {
    const div = document.createElement("div");
    div.className = "nothing";
    div.innerText = "Nothing found";
    gallery.appendChild(div);
  } else {
    filtered.forEach(renderImage);
  }
});

// FULLSCREEN FUNCTIONS
function openFullscreen(data) {
  fsImg.src = data.img;
  fullscreen.style.display = "flex";
  window.open(data.link, "_blank");
}

function closeFullscreen() {
  fullscreen.style.display = "none";
}
</script>

</body>
</html>
