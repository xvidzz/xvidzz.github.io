<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>

/* RESET */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* ===== TOP BAR ===== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #000;
  padding: 10px 20px;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.menu {
  display: flex;
  gap: 20px;
}

.menu a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  opacity: 0.8;
}

.menu a:hover {
  opacity: 1;
}

.burger {
  font-size: 22px;
  cursor: pointer;
}

/* ===== SUB NAV ===== */
.subnav {
  background: #1a1a1a;
  padding: 15px 20px;
  color: #ccc;
}

.subnav .home {
  display: block;
  font-size: 18px;
  margin-bottom: 10px;
}

.tabs {
  display: flex;
  gap: 20px;
}

.tabs span {
  cursor: pointer;
  font-size: 14px;
  opacity: 0.7;
}

.tabs .active {
  color: #ff4d6d;
  opacity: 1;
}

/* ===== GALLERY ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  padding: 10px;
}

.card img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  border-radius: 10px;
  transition: 0.3s;
}

.card img:hover {
  transform: scale(1.05);
}

/* ===== ADS ===== */
.ad {
  text-align: center;
  margin: 15px;
}

/* ===== BUTTON ===== */
.load-more {
  text-align: center;
  margin: 20px;
}

button {
  padding: 10px 20px;
  background: #ff4d6d;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

</style>
</head>
