<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xvidzz</title>
<link rel="icon" href="pictures/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: #0b0b0b;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #111;
  padding: 10px 20px;
  position: fixed;
  width: 100%;
  z-index: 1000;
  top: 0;
}
.left { display: flex; align-items: center; gap: 15px; }
.logo { font-size: 26px; font-weight: 800; }
.logo span { background: orange; color: black; padding: 2px 6px; border-radius: 4px; }
.search { flex: 1; display: flex; justify-content: center; }
.search input {
  width: 100%;
  max-width: 400px;
  padding: 10px;
  border-radius: 25px;
  border: none;
  background: #1c1c1c;
  color: white;
  outline: none;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  box-sizing: border-box;
}

/* ── BANNER ── */
.banner { width: 100%; text-align: center; padding: 5px 0; overflow: hidden; }
.banner-top { margin-top: 60px; }

/* ── CATEGORY PILLS ── */
.categories {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.categories::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  padding: 6px 16px;
  border-radius: 999px;
  border: 1px solid #2a2a2a;
  background: #111;
  color: #888;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.pill:hover, .pill.active { background: orange; color: #000; border-color: orange; }

/* ── GALLERY ── */
.gallery-label {
  padding: 4px 14px 6px;
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 0 10px 10px;
}
@media (min-width: 480px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 768px) { .gallery { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 1024px) { .gallery { grid-template-columns: repeat(5, 1fr); } }

.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.card:active { opacity: 0.8; }
.card-img-wrap { position: relative; padding-top: 130%; overflow: hidden; }
.card img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.card-title {
  font-size: 13px;
  padding: 5px 8px 7px;
  color: #ccc;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sentinel { height: 40px; }
.nothing {
  color: #aaa;
  font-size: 16px;
  text-align: center;
  grid-column: 1 / -1;
  padding: 60px 0;
}

/* ── FULLSCREEN ── */
/* sits right below the fixed header, scrollable */
.fullscreen {
  position: fixed;
  top: 60px;           /* header height */
  left: 0;
  width: 100%;
  height: calc(100% - 60px);
  background: #000;
  display: none;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  z-index: 999;
}
.fullscreen.open { display: flex; }

/* main image block fills full visible area so you must scroll to see related */
.fs-img-area {
  width: 100%;
  height: calc(100vh - 60px); /* exactly the visible area below header */
  flex-shrink: 0;
  position: relative;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fs-img-area img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  user-select: none;
}
.fs-close {
  position: absolute;
  top: 12px;
  right: 14px;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  font-weight: bold;
  cursor: pointer;
  color: white;
  background: rgba(0,0,0,0.65);
  border-radius: 50%;
  z-index: 10;
}
.fs-title-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  padding: 30px 14px 14px;
  font-size: 15px;
  font-weight: 600;
  pointer-events: none;
}

/* scroll hint arrow */
.fs-scroll-hint {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: rgba(255,255,255,0.5);
  font-size: 11px;
  pointer-events: none;
  animation: bounce 1.6s infinite;
}
.fs-scroll-hint svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.5); }
@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(5px); }
}

/* ── RELATED ── */
.related-section {
  background: #111;
  padding: 14px 12px 30px;
  border-top: 1px solid #1e1e1e;
  flex-shrink: 0;
}
.related-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  margin-bottom: 10px;
}
.related-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
@media (min-width: 480px) { .related-grid { grid-template-columns: repeat(4, 1fr); } }

.related-card {
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  background: #1c1c1c;
  -webkit-tap-highlight-color: transparent;
}
.related-card:active { opacity: 0.8; }
.related-card-img-wrap { position: relative; padding-top: 130%; }
.related-card img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.related-card-title {
  font-size: 11px;
  color: #aaa;
  padding: 4px 5px 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── IG OVERLAY ── */
.ig-overlay {
  position: fixed;
  inset: 0;
  background: #0b0b0b;
  z-index: 99999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  text-align: center;
}
.ig-icon { font-size: 56px; margin-bottom: 20px; }
.ig-overlay h2 { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
.ig-overlay p { color: #888; font-size: 15px; line-height: 1.7; max-width: 300px; }
.ig-overlay strong { color: white; }
.ig-step {
  display: inline-block;
  background: orange;
  color: #000;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 6px;
  margin-top: 4px;
}
</style>
</head>
<body>

<!-- IG OVERLAY -->
<div class="ig-overlay" id="igOverlay" style="display:none;">
  <div class="ig-icon">🌐</div>
  <h2>Open in Browser</h2>
  <p>
    Instagram's built-in browser blocks this site.<br><br>
    Tap the <strong>⋯ menu</strong> (top right corner)<br>
    then select <span class="ig-step">Open in external browser</span>
  </p>
</div>

<!-- HEADER -->
<div class="header">
  <div class="left">
    <div class="logo">X<span>vidzz</span></div>
  </div>
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search Xvidzz">
  </div>
</div>

<!-- TOP BANNER -->
<div class="banner banner-top">
  <script>
    atOptions = { 'key' : '983b9cd2f75f07d4c0212fa312f1c19e', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
  </script>
  <script src="https://www.highperformanceformat.com/983b9cd2f75f07d4c0212fa312f1c19e/invoke.js"></script>
</div>

<!-- CATEGORY PILLS -->
<div class="categories" id="categoryPills"></div>

<!-- GALLERY LABEL -->
<div class="gallery-label" id="galleryLabel">All photos</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>
<div class="sentinel" id="sentinel"></div>

<!-- BOTTOM BANNER -->
<div class="banner">
  <script src="https://pl28980273.profitablecpmratenetwork.com/18/b3/02/18b302cf47484bb230e4bff70f2b3c0c.js"></script>
</div>

<!-- FULLSCREEN VIEWER -->
<div class="fullscreen" id="fullscreen">

  <!-- MAIN IMAGE — fills full visible area, scroll down for related -->
  <div class="fs-img-area">
    <div class="fs-close" onclick="closeFullscreen()">×</div>
    <img id="fsImg" src="" alt="">
    <div class="fs-title-bar" id="fsTitleBar"></div>
    <div class="fs-scroll-hint">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 16l-6-6h12z"/></svg>
      more
    </div>
  </div>

  <!-- RELATED — visible only when user scrolls down -->
  <div class="related-section">
    <div class="related-label">More like this</div>
    <div class="related-grid" id="relatedGrid"></div>
  </div>

</div>

<script>
// ── IG DETECTION ──
(function() {
  const ua = navigator.userAgent || '';
  if (ua.includes('Instagram') || ua.includes('FBAN') || ua.includes('FBAV')) {
    document.getElementById('igOverlay').style.display = 'flex';
  }
})();

// ── IMAGE DATA ──
// tags: used for category pills AND related section
// Add more images by copying the pattern below
const images = [
  { img: "pictures/img1.png", title: "Mountain Sunrise", tags: ["nature", "mountain"], link: "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de" },
  { img: "pictures/img2.png", title: "Forest Trail",     tags: ["nature", "forest"],   link: "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de" },
  { img: "pictures/img3.png", title: "City Lights",      tags: ["city", "night"],      link: "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de" },
  // pridaj ďalšie sem...
];

// ── STATE ──
let activeCategory = 'all';
let searchQuery    = '';
let currentData    = [];
let renderedCount  = 0;
const PAGE_SIZE    = 12;

// ── BUILD CATEGORY PILLS ──
function buildCategories() {
  const tagSet = new Set();
  images.forEach(img => img.tags.forEach(t => tagSet.add(t)));
  const pills = document.getElementById('categoryPills');
  pills.innerHTML = '';
  ['all', ...tagSet].forEach(tag => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (tag === 'all' ? ' active' : '');
    pill.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
    pill.onclick = () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeCategory = tag;
      resetGallery();
    };
    pills.appendChild(pill);
  });
}

// ── FILTER ──
function getFiltered() {
  return images.filter(img => {
    const matchCat    = activeCategory === 'all' || img.tags.includes(activeCategory);
    const matchSearch = img.title.toLowerCase().includes(searchQuery);
    return matchCat && matchSearch;
  });
}

// ── RESET GALLERY ──
function resetGallery() {
  currentData   = getFiltered();
  renderedCount = 0;
  document.getElementById('gallery').innerHTML = '';
  const label = document.getElementById('galleryLabel');
  if (searchQuery) {
    label.textContent = `Results for "${searchQuery}" — ${currentData.length} photo${currentData.length !== 1 ? 's' : ''}`;
  } else if (activeCategory !== 'all') {
    label.textContent = `${activeCategory.charAt(0).toUpperCase() + activeCategory.slice(1)} — ${currentData.length}`;
  } else {
    label.textContent = `All photos — ${currentData.length}`;
  }
  loadNextBatch();
}

// ── RENDER CARD ──
function renderCard(data) {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-img-wrap">
      <img src="${data.img}" alt="${data.title}" loading="lazy">
    </div>
    <div class="card-title">${data.title}</div>
  `;
  div.onclick = () => openFullscreen(data);
  return div;
}

// ── LOAD NEXT BATCH ──
function loadNextBatch() {
  const gallery = document.getElementById('gallery');
  if (currentData.length === 0 && renderedCount === 0) {
    const msg = document.createElement('div');
    msg.className = 'nothing';
    msg.textContent = 'Nothing found';
    gallery.appendChild(msg);
    return;
  }
  const batch = currentData.slice(renderedCount, renderedCount + PAGE_SIZE);
  batch.forEach(item => gallery.appendChild(renderCard(item)));
  renderedCount += batch.length;
}

// ── INFINITE SCROLL ──
const observer = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && renderedCount < currentData.length) {
    loadNextBatch();
  }
}, { rootMargin: '200px' });
observer.observe(document.getElementById('sentinel'));

// ── OPEN FULLSCREEN ──
function openFullscreen(data) {
  document.getElementById('fsImg').src = data.img;
  document.getElementById('fsTitleBar').textContent = data.title;
  buildRelated(data);
  const fs = document.getElementById('fullscreen');
  fs.classList.add('open');
  fs.scrollTop = 0;  // start at top = main image, user scrolls down for related
  document.body.style.overflow = 'hidden';
  window.open(data.link, '_blank'); // popunder
}

function closeFullscreen() {
  document.getElementById('fullscreen').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('fsImg').src = '';
}

// ── BUILD RELATED ──
function buildRelated(data) {
  const grid = document.getElementById('relatedGrid');
  grid.innerHTML = '';
  const related = images.filter(img =>
    img !== data && img.tags.some(t => data.tags.includes(t))
  ).slice(0, 18);

  if (related.length === 0) {
    grid.innerHTML = '<div style="color:#666;font-size:13px;padding:8px 0;grid-column:1/-1;">No related photos</div>';
    return;
  }
  related.forEach(item => {
    const card = document.createElement('div');
    card.className = 'related-card';
    card.innerHTML = `
      <div class="related-card-img-wrap">
        <img src="${item.img}" alt="${item.title}" loading="lazy">
      </div>
      <div class="related-card-title">${item.title}</div>
    `;
    card.onclick = () => openFullscreen(item);
    grid.appendChild(card);
  });
}

// ── ESC to close ──
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFullscreen(); });

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.toLowerCase().trim();
  resetGallery();
});

// ── INIT ──
buildCategories();
resetGallery();
</script>
</body>
</html>
