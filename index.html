<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xvidzz</title>
<link rel="icon" href="pictures/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --accent: #ff6b00;
  --accent2: #ff9500;
  --text: #f0f0f0;
  --muted: #888;
  --radius: 12px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 10px 16px;
  position: fixed;
  width: 100%;
  z-index: 1000;
  top: 0;
  border-bottom: 1px solid #1e1e1e;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 1px;
  white-space: nowrap;
  flex-shrink: 0;
}
.logo span {
  background: var(--accent);
  color: #000;
  padding: 1px 6px;
  border-radius: 5px;
}

.search-wrap {
  flex: 1;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border-radius: 999px;
  border: 1px solid #222;
  background: var(--surface2);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap::before {
  content: '🔍';
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 13px;
  pointer-events: none;
}

/* ── BANNER ── */
.banner {
  width: 100%;
  text-align: center;
  padding: 6px 0;
  background: var(--bg);
  overflow: hidden;
}
.banner-top { margin-top: 60px; }

/* ── CATEGORY PILLS ── */
.categories {
  display: flex;
  gap: 8px;
  padding: 10px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.categories::-webkit-scrollbar { display: none; }
.pill {
  flex-shrink: 0;
  padding: 6px 16px;
  border-radius: 999px;
  border: 1px solid #2a2a2a;
  background: var(--surface);
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.18s;
  user-select: none;
}
.pill:hover, .pill.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* ── GALLERY GRID ── */
.gallery-label {
  padding: 4px 14px 6px;
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 0 10px 10px;
}

@media (min-width: 480px) {
  .gallery { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 768px) {
  .gallery { grid-template-columns: repeat(4, 1fr); }
}
@media (min-width: 1024px) {
  .gallery { grid-template-columns: repeat(5, 1fr); }
}

.card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  position: relative;
  transition: transform 0.18s, box-shadow 0.18s;
  -webkit-tap-highlight-color: transparent;
}
.card:active { transform: scale(0.97); }
.card-img-wrap {
  position: relative;
  padding-top: 130%;
  overflow: hidden;
}
.card img {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}
.card:hover img { transform: scale(1.05); }
.card-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.75));
  padding: 20px 8px 8px;
  opacity: 0;
  transition: opacity 0.2s;
}
.card:hover .card-overlay { opacity: 1; }
.card-title {
  font-size: 12px;
  color: #ddd;
  padding: 6px 8px 7px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── LAZY LOAD SENTINEL ── */
.sentinel { height: 40px; }

.nothing {
  color: var(--muted);
  font-size: 16px;
  text-align: center;
  grid-column: 1 / -1;
  padding: 60px 0;
}

/* ── FULLSCREEN VIEWER ── */
.fullscreen {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.97);
  display: none;
  flex-direction: column;
  z-index: 2000;
  overscroll-behavior: contain;
}
.fullscreen.open { display: flex; }

.fs-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  flex-shrink: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
}
.fs-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: calc(100% - 60px);
}
.fs-close {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  cursor: pointer;
  color: white;
  background: #222;
  border-radius: 50%;
  flex-shrink: 0;
}

.fs-img-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 10px;
}
.fs-img-area img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 8px;
  user-select: none;
}

/* ── RELATED SECTION ── */
.related-section {
  flex-shrink: 0;
  background: var(--surface);
  padding: 10px 12px 14px;
  border-top: 1px solid #1e1e1e;
}
.related-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
}
.related-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 2px;
}
.related-scroll::-webkit-scrollbar { display: none; }
.related-card {
  flex-shrink: 0;
  width: 90px;
  cursor: pointer;
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface2);
  transition: transform 0.15s;
}
.related-card:active { transform: scale(0.95); }
.related-card img {
  width: 100%;
  height: 110px;
  object-fit: cover;
  display: block;
}
.related-card-title {
  font-size: 10px;
  color: #aaa;
  padding: 4px 5px 5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── IG OVERLAY ── */
.ig-overlay {
  position: fixed;
  inset: 0;
  background: #080808;
  z-index: 99999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  text-align: center;
}
.ig-icon { font-size: 56px; margin-bottom: 20px; }
.ig-overlay h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.ig-overlay p {
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
  max-width: 300px;
}
.ig-overlay strong { color: white; }
.ig-step {
  display: inline-block;
  background: var(--accent);
  color: #000;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 6px;
  margin-top: 4px;
}
</style>
</head>
<body>

<!-- IG OVERLAY -->
<div class="ig-overlay" id="igOverlay" style="display:none;">
  <div class="ig-icon">🌐</div>
  <h2>Open in Browser</h2>
  <p>
    Instagram's built-in browser blocks this site.<br><br>
    Tap the <strong>⋯ menu</strong> (top right corner)<br>
    then select <span class="ig-step">Open in external browser</span>
  </p>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">X<span>vidzz</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search...">
  </div>
</div>

<!-- TOP BANNER -->
<div class="banner banner-top">
  <script>
    atOptions = { 'key' : '983b9cd2f75f07d4c0212fa312f1c19e', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
  </script>
  <script src="https://www.highperformanceformat.com/983b9cd2f75f07d4c0212fa312f1c19e/invoke.js"></script>
</div>

<!-- CATEGORY PILLS -->
<div class="categories" id="categoryPills"></div>

<!-- GALLERY LABEL -->
<div class="gallery-label" id="galleryLabel">All photos</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>
<div class="sentinel" id="sentinel"></div>

<!-- BOTTOM BANNER -->
<div class="banner">
  <script src="https://pl28980273.profitablecpmratenetwork.com/18/b3/02/18b302cf47484bb230e4bff70f2b3c0c.js"></script>
</div>

<!-- FULLSCREEN VIEWER -->
<div class="fullscreen" id="fullscreen">
  <div class="fs-topbar">
    <div class="fs-title" id="fsTitle"></div>
    <div class="fs-close" onclick="closeFullscreen()">×</div>
  </div>
  <div class="fs-img-area">
    <img id="fsImg" src="" alt="">
  </div>
  <div class="related-section">
    <div class="related-label">More like this</div>
    <div class="related-scroll" id="relatedScroll"></div>
  </div>
</div>

<script>
// ── IG DETECTION ──
(function() {
  const ua = navigator.userAgent || '';
  if (ua.includes('Instagram') || ua.includes('FBAN') || ua.includes('FBAV')) {
    document.getElementById('igOverlay').style.display = 'flex';
  }
})();

// ── IMAGE DATA ──
// Format: { img, title, tags: [] }
// tags drive the "related" and category filter
const images = [
  { img: "pictures/img1.png", title: "Mountain Sunrise", tags: ["nature", "mountain"], link: "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de" },
  { img: "pictures/img2.png", title: "Forest Trail",     tags: ["nature", "forest"],   link: "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de" },
  { img: "pictures/img3.png", title: "City Lights",      tags: ["city", "night"],      link: "https://www.profitablecpmratenetwork.com/k8t6yfa427?key=cd32e922e02220f156f81429034a38de" },
  // ADD MORE IMAGES HERE — just copy the line above
];

// ── STATE ──
let activeCategory = 'all';
let searchQuery = '';
let currentData = [];     // currently visible filtered images
let renderedCount = 0;
const PAGE_SIZE = 12;     // how many images load per scroll batch

// ── BUILD CATEGORIES FROM TAGS ──
function buildCategories() {
  const tagSet = new Set();
  images.forEach(img => img.tags.forEach(t => tagSet.add(t)));
  const pills = document.getElementById('categoryPills');
  pills.innerHTML = '';

  ['all', ...tagSet].forEach(tag => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (tag === 'all' ? ' active' : '');
    pill.textContent = tag.charAt(0).toUpperCase() + tag.slice(1);
    pill.onclick = () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeCategory = tag;
      resetGallery();
    };
    pills.appendChild(pill);
  });
}

// ── FILTER LOGIC ──
function getFiltered() {
  return images.filter(img => {
    const matchCat = activeCategory === 'all' || img.tags.includes(activeCategory);
    const matchSearch = img.title.toLowerCase().includes(searchQuery);
    return matchCat && matchSearch;
  });
}

// ── RESET & RE-RENDER ──
function resetGallery() {
  currentData = getFiltered();
  renderedCount = 0;
  document.getElementById('gallery').innerHTML = '';
  const label = document.getElementById('galleryLabel');
  if (searchQuery) {
    label.textContent = `Results for "${searchQuery}" — ${currentData.length} photo${currentData.length !== 1 ? 's' : ''}`;
  } else if (activeCategory !== 'all') {
    label.textContent = `${activeCategory.charAt(0).toUpperCase() + activeCategory.slice(1)} — ${currentData.length} photo${currentData.length !== 1 ? 's' : ''}`;
  } else {
    label.textContent = `All photos — ${currentData.length}`;
  }
  loadNextBatch();
}

// ── RENDER A CARD ──
function renderCard(data, index) {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-img-wrap">
      <img src="${data.img}" alt="${data.title}" loading="lazy">
      <div class="card-overlay"></div>
    </div>
    <div class="card-title">${data.title}</div>
  `;
  div.onclick = () => openFullscreen(data);
  return div;
}

// ── LOAD NEXT BATCH (infinite scroll) ──
function loadNextBatch() {
  const gallery = document.getElementById('gallery');

  if (currentData.length === 0 && renderedCount === 0) {
    const msg = document.createElement('div');
    msg.className = 'nothing';
    msg.textContent = 'Nothing found';
    gallery.appendChild(msg);
    return;
  }

  const batch = currentData.slice(renderedCount, renderedCount + PAGE_SIZE);
  batch.forEach((item, i) => gallery.appendChild(renderCard(item, renderedCount + i)));
  renderedCount += batch.length;
}

// ── INFINITE SCROLL via IntersectionObserver ──
const sentinel = document.getElementById('sentinel');
const observer = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && renderedCount < currentData.length) {
    loadNextBatch();
  }
}, { rootMargin: '200px' });
observer.observe(sentinel);

// ── FULLSCREEN ──
let currentOpen = null;

function openFullscreen(data) {
  currentOpen = data;
  document.getElementById('fsImg').src = data.img;
  document.getElementById('fsTitle').textContent = data.title;
  buildRelated(data);
  document.getElementById('fullscreen').classList.add('open');
  document.body.style.overflow = 'hidden';
  // popunder / smartlink
  window.open(data.link, '_blank');
}

function closeFullscreen() {
  document.getElementById('fullscreen').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('fsImg').src = '';
  currentOpen = null;
}

// ── BUILD RELATED (same tag, exclude current) ──
function buildRelated(data) {
  const scroll = document.getElementById('relatedScroll');
  scroll.innerHTML = '';

  const related = images.filter(img =>
    img !== data && img.tags.some(t => data.tags.includes(t))
  ).slice(0, 20);

  if (related.length === 0) {
    scroll.innerHTML = '<div style="color:#666;font-size:13px;padding:8px 0;">No related photos</div>';
    return;
  }

  related.forEach(item => {
    const card = document.createElement('div');
    card.className = 'related-card';
    card.innerHTML = `
      <img src="${item.img}" alt="${item.title}" loading="lazy">
      <div class="related-card-title">${item.title}</div>
    `;
    card.onclick = () => openFullscreen(item);
    scroll.appendChild(card);
  });
}

// ── CLOSE FULLSCREEN on backdrop click ──
document.getElementById('fullscreen').addEventListener('click', function(e) {
  if (e.target === this) closeFullscreen();
});

// ── CLOSE on ESC ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeFullscreen();
});

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.toLowerCase().trim();
  resetGallery();
});

// ── INIT ──
buildCategories();
resetGallery();
</script>
</body>
</html>
